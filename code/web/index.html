<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Luxury Watch Scroll Sequence</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main>
      <section
        class="watch-sequence"
        data-frame-sequence
        data-frame-path="../../design/frame-audit/optimized-webp-72/watch-scroll-{index}.webp"
        data-video-src="../../design/frame-audit/watch-scroll-72-1080p.mp4"
        data-frame-count="72"
        data-scroll-length="260%"
        aria-label="Luxury watch motion sequence"
      >
        <canvas
          class="watch-sequence__canvas"
          width="1080"
          height="1080"
          aria-hidden="true"
        ></canvas>
        <video
          class="watch-sequence__fallback"
          src="../../design/frame-audit/watch-scroll-72-1080p.mp4"
          muted
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
